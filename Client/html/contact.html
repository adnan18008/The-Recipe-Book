<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
  <meta charset="UTF-8">
  <title>Contact Us | Recipe Book</title>
  <link rel="stylesheet" href="../Stylesheet/variables.css">
  <link rel="stylesheet" href="../Stylesheet/contact.css">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
  <script src="https://kit.fontawesome.com/1c28ce0176.js" crossorigin="anonymous"></script>
</head>

<body>
  <div class="container">
    <h1 class="page-title">Get in Touch</h1>
    <div class="content">
      <div class="left-side">
        <div class="address details">
          <i class="fas fa-map-marker-alt"></i>
          <div class="topic">Address</div>
          <div class="text-one">123 Recipe St</div>
          <div class="text-two">Foodville, FV 94043</div>
        </div>
        <div class="phone details">
          <i class="fas fa-phone-alt"></i>
          <div class="topic">Phone</div>
          <div class="text-one">+1 (123) 456-7890</div>
          <div class="text-two">+1 (987) 654-3210</div>
        </div>
        <div class="email details">
          <i class="fas fa-envelope"></i>
          <div class="topic">Email</div>
          <div class="text-one">hello@recipebook.com</div>
          <div class="text-two">support@recipebook.com</div>
        </div>
      </div>
      <div class="right-side">
        <div class="topic-text">Send us a message</div>
        <p style="margin-bottom: 20px; color: rgba(255,255,255,0.7);">If you have any questions or just want to say hi,
          feel free to drop us a line!</p>
        <form action="#">
          <div class="input-box">
            <input type="text" placeholder="Enter your name">
          </div>
          <div class="input-box">
            <input type="text" placeholder="Enter your email">
          </div>
          <div class="input-box message-box">
            <textarea placeholder="Enter your message"></textarea>
          </div>
          <div class="button">
            <input type="button" value="Send Message">
          </div>
          <div class="back-link">
            <a href="Homepage.html">Back to Home</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</body>

</html>
